<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Seatmap Demo</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#111;color:#eee;padding:20px}
    #controls{margin-bottom:12px}
    #seatmap{display:flex;flex-direction:column;gap:12px}
    .section{border:1px solid #333;padding:8px;border-radius:6px}
    .seats{display:flex;flex-wrap:wrap;gap:6px}
    .seat{width:36px;height:36px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:#0b0b18;border:1px solid #222;color:#9aa}
    .seat.available{background:#1839ff33;border-color:#3b66ff;color:#3b66ff}
    .seat.purchased{background:#222;border-color:#444;color:#666;cursor:default}
    .seat.blocked{background:#5a1f1f;border-color:#7a2f2f;color:#ffb3b3;cursor:default}
    .seat.waitlist_held{background:#b36f0033;border-color:#d99000;color:#d99000}
    .seat.vip_reserved{background:#6b3fb833;border-color:#8b65f5;color:#8b65f5}
  </style>
</head>
<body>
  <h2>Seatmap Demo</h2>
  <div id="controls">
    <label>Email: <input id="email" value="smoke.user@example.com"></label>
    <label>Password: <input id="password" type="password" value="Test1234!"></label>
    <button id="login">Login</button>
    <span id="status"></span>
  </div>

  <div>
    <label>Event ID: <input id="eventId" value="E001"></label>
    <button id="load">Load Seatmap</button>
  </div>

  <div id="seatmap"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="seatmap.js"></script>
</body>
</html>
